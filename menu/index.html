<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>午觉糖水铺 Menu</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f3ea;
      --line: rgba(255, 255, 255, 0.22);
      --accent: #e7b9ce;
      --reveal-width: min(45vw, 430px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.18), transparent 4px),
        radial-gradient(circle at 78% 10%, rgba(255, 255, 255, 0.14), transparent 3px),
        linear-gradient(135deg, #161514 0%, #2c2926 42%, #111 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.16;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }

    .menu-shell {
      position: relative;
      display: grid;
      min-height: 100svh;
      padding: clamp(14px, 2vw, 30px);
      place-items: center;
    }

    .poster-wrap {
      position: relative;
      width: min(100%, calc(100svh - 28px));
      max-width: min(92vw, 920px);
      aspect-ratio: 1798 / 1800;
      overflow: visible;
      filter: drop-shadow(0 24px 70px rgba(0, 0, 0, 0.48));
    }

    .poster {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      object-fit: cover;
      user-select: none;
    }

    .character-slot {
      position: absolute;
      top: 17%;
      z-index: 2;
      width: 15%;
      height: 57%;
      isolation: isolate;
    }

    .character-slot:hover,
    .character-slot:focus-within,
    .character-slot.is-active {
      z-index: 12;
    }

    .slot-kazusa { left: 5.4%; }
    .slot-reisa { left: 20.3%; }
    .slot-alice { left: 35.4%; }
    .slot-kei { left: 50.2%; }
    .slot-hina { left: 65.2%; }
    .slot-hoshino { left: 79.8%; }

    .hotspot {
      position: absolute;
      inset: 0;
      z-index: 3;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      cursor: pointer;
      appearance: none;
    }

    .hotspot::after {
      position: absolute;
      inset: 0;
      content: "";
      opacity: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.24), rgba(231, 185, 206, 0.14));
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: -2px;
      transition: opacity 180ms ease;
    }

    .character-slot:hover .hotspot::after,
    .character-slot:focus-within .hotspot::after,
    .character-slot.is-active .hotspot::after {
      opacity: 1;
    }

    .hotspot:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .character-reveal {
      position: absolute;
      top: -4%;
      left: 0;
      z-index: 4;
      display: grid;
      width: 100%;
      height: 108%;
      grid-template-columns: minmax(0, 1fr) 54px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: linear-gradient(90deg, rgba(255, 250, 242, 0.96), rgba(244, 226, 233, 0.92));
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.36);
      opacity: 0;
      pointer-events: none;
      transform-origin: left center;
      transition:
        width 420ms cubic-bezier(.2, .8, .2, 1),
        opacity 160ms ease,
        box-shadow 260ms ease;
    }

    .character-slot:hover .character-reveal,
    .character-slot:focus-within .character-reveal,
    .character-slot.is-active .character-reveal {
      width: var(--reveal-width);
      opacity: 1;
      pointer-events: auto;
      box-shadow: 0 26px 68px rgba(0, 0, 0, 0.44);
    }

    .character-image {
      align-self: end;
      justify-self: center;
      width: min(78%, 310px);
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      opacity: 0;
      transform: translateX(-12px) scale(0.985);
      transition:
        opacity 220ms ease 90ms,
        transform 380ms cubic-bezier(.2, .8, .2, 1) 60ms;
    }

    .character-slot:hover .character-image,
    .character-slot:focus-within .character-image,
    .character-slot.is-active .character-image {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .character-name {
      display: grid;
      place-items: center;
      min-width: 0;
      margin: 0;
      border-left: 1px solid rgba(32, 27, 29, 0.14);
      color: #241e21;
      font-size: clamp(22px, 3.1vw, 38px);
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1.05;
      text-orientation: mixed;
      writing-mode: vertical-rl;
    }

    @media (max-width: 760px) {
      :root {
        --reveal-width: min(62vw, 280px);
      }

      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .menu-shell {
        min-height: 100svh;
        padding: 12px;
        place-items: start center;
      }

      .poster-wrap {
        width: min(100%, 92svh);
        max-width: 100%;
      }

      .character-reveal {
        grid-template-columns: minmax(0, 1fr) 46px;
      }

      .character-image {
        width: 76%;
      }

      .character-name {
        font-size: clamp(20px, 6vw, 28px);
      }

      .slot-kei .character-reveal,
      .slot-hina .character-reveal,
      .slot-hoshino .character-reveal {
        right: 0;
        left: auto;
        transform-origin: right center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="menu-shell" id="menuShell">
    <section class="poster-wrap" aria-label="午觉糖水铺角色主视觉">
      <img class="poster" src="assets/menu-main.jpg" alt="午觉糖水铺主视觉" draggable="false">

      <div class="character-slot slot-kazusa" data-character="kazusa">
        <button class="hotspot" type="button" aria-label="杏山和纱"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/kazusa.jpg" alt="杏山和纱" draggable="false">
          <h1 class="character-name">杏山和纱</h1>
        </article>
      </div>

      <div class="character-slot slot-reisa" data-character="reisa">
        <button class="hotspot" type="button" aria-label="宇泽玲纱"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/reisa.jpg" alt="宇泽玲纱" draggable="false">
          <h1 class="character-name">宇泽玲纱</h1>
        </article>
      </div>

      <div class="character-slot slot-alice" data-character="alice">
        <button class="hotspot" type="button" aria-label="天童爱丽丝"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/alice.jpg" alt="天童爱丽丝" draggable="false">
          <h1 class="character-name">天童爱丽丝</h1>
        </article>
      </div>

      <div class="character-slot slot-kei" data-character="kei">
        <button class="hotspot" type="button" aria-label="天童凯伊"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/kei.jpg" alt="天童凯伊" draggable="false">
          <h1 class="character-name">天童凯伊</h1>
        </article>
      </div>

      <div class="character-slot slot-hina" data-character="hina">
        <button class="hotspot" type="button" aria-label="空崎日奈"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/hina.jpg" alt="空崎日奈" draggable="false">
          <h1 class="character-name">空崎日奈</h1>
        </article>
      </div>

      <div class="character-slot slot-hoshino" data-character="hoshino">
        <button class="hotspot" type="button" aria-label="小鸟游星野"></button>
        <article class="character-reveal" aria-hidden="true">
          <img class="character-image" src="assets/hoshino.jpg" alt="小鸟游星野" draggable="false">
          <h1 class="character-name">小鸟游星野</h1>
        </article>
      </div>
    </section>
  </main>

  <script>
    const shell = document.getElementById('menuShell');
    const slots = Array.from(document.querySelectorAll('.character-slot'));

    function setActive(slot) {
      slots.forEach((item) => item.classList.toggle('is-active', item === slot));
      if (slot) {
        shell.dataset.active = slot.dataset.character;
      } else {
        delete shell.dataset.active;
      }
    }

    slots.forEach((slot) => {
      slot.addEventListener('click', (event) => {
        event.stopPropagation();
        setActive(slot);
      });

      slot.addEventListener('focusin', () => setActive(slot));
    });

    document.addEventListener('click', () => setActive(null));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setActive(null);
    });
  </script>
</body>
</html>
