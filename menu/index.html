<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>午觉糖水铺 Menu</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f0e6;
      --muted: rgba(246, 240, 230, 0.72);
      --paper: #fffdf7;
      --paper-soft: #f8e9ee;
      --poster-width: min(94vw, calc(100svh - 28px), 920px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.18), transparent 4px),
        radial-gradient(circle at 84% 16%, rgba(255, 255, 255, 0.18), transparent 3px),
        radial-gradient(circle at 50% 82%, rgba(255, 255, 255, 0.12), transparent 6px),
        linear-gradient(135deg, #151412 0%, #2b2926 45%, #0f0f0f 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.15;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.11) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent, #000 16%, #000 86%, transparent);
    }

    body::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.55;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 255, 255, 0.24) 0 1px, transparent 1.5px);
      background-position: 0 0, 18px 22px;
      background-size: 70px 70px, 96px 96px;
    }

    .menu-shell {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 100svh;
      padding: clamp(14px, 2.2vw, 28px);
      place-items: start center;
    }

    .poster {
      position: relative;
      width: var(--poster-width);
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background:
        radial-gradient(circle at 62% 23%, rgba(255, 255, 255, 0.16), transparent 4px),
        radial-gradient(circle at 18% 74%, rgba(255, 255, 255, 0.2), transparent 5px),
        linear-gradient(180deg, rgba(55, 55, 55, 0.86), rgba(24, 24, 23, 0.96));
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.45);
    }

    .poster::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.28;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 255, 255, 0.44) 0 1px, transparent 1.5px);
      background-position: 8px 12px, 34px 42px;
      background-size: 58px 58px, 84px 84px;
    }

    .poster-content {
      position: relative;
      z-index: 1;
      display: grid;
      height: 100%;
      grid-template-rows: 23% 52% minmax(0, 1fr);
      gap: clamp(10px, 1.65vw, 18px);
      padding: clamp(20px, 3.2vw, 42px);
    }

    .poster-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(12px, 2vw, 24px);
      align-items: start;
    }

    .brand-title {
      margin: 0;
      font-family: "Songti SC", "STSong", serif;
      font-size: clamp(38px, 5vw, 62px);
      font-weight: 300;
      letter-spacing: 0;
      line-height: 0.9;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
      white-space: nowrap;
    }

    .brand-script {
      display: block;
      margin-top: -0.04em;
      margin-left: clamp(70px, 12vw, 150px);
      color: rgba(255, 255, 255, 0.32);
      font-family: "Snell Roundhand", "Brush Script MT", cursive;
      font-size: clamp(30px, 5.4vw, 58px);
      line-height: 0.8;
    }

    .archive {
      display: inline-block;
      margin-left: clamp(130px, 22vw, 270px);
      color: rgba(255, 255, 255, 0.44);
      font-family: "Snell Roundhand", "Brush Script MT", cursive;
      font-size: clamp(34px, 6.2vw, 70px);
      line-height: 0.72;
    }

    .booth {
      display: grid;
      gap: 10px;
      justify-items: end;
      color: rgba(255, 255, 255, 0.9);
      text-align: right;
      white-space: nowrap;
    }

    .booth-number {
      font-family: "Songti SC", "STSong", serif;
      font-size: clamp(28px, 3.9vw, 48px);
      font-weight: 300;
      line-height: 0.95;
    }

    .booth-number small {
      font-size: 0.48em;
    }

    .market {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      background: rgba(255, 255, 255, 0.93);
      color: #161412;
      font-size: clamp(22px, 2.5vw, 32px);
      line-height: 1;
    }

    .heart {
      font-size: 0.8em;
      line-height: 1;
    }

    .character-strip {
      position: relative;
      display: flex;
      align-items: flex-start;
      width: 100%;
      min-width: 0;
      height: 100%;
      overflow: visible;
      background: #fffdf8;
      isolation: isolate;
      transition: margin 520ms cubic-bezier(.2, .8, .2, 1), transform 520ms cubic-bezier(.2, .8, .2, 1);
    }

    .character-strip::before {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      content: "";
      background: #fffdf8;
    }

    .menu-shell[data-active] .character-strip {
      margin-bottom: clamp(34px, 5.8vw, 64px);
    }

    .character-card {
      position: relative;
      display: grid;
      z-index: 1;
      min-width: 0;
      height: 100%;
      flex: 0 0 calc(100% / 6);
      grid-template-columns: minmax(0, 1fr) 0;
      overflow: hidden;
      border: 0;
      background: #fffdf8;
      color: #fff;
      cursor: pointer;
      outline: none;
      transition:
        flex 520ms cubic-bezier(.2, .8, .2, 1),
        height 520ms cubic-bezier(.2, .8, .2, 1);
      appearance: none;
      -webkit-tap-highlight-color: transparent;
      --crop-scale: 1.56;
      --crop-shift-y: 7%;
    }

    .character-card:hover,
    .character-card:focus-visible {
      z-index: 2;
    }

    .character-card.is-active {
      z-index: 3;
      height: calc(100% + clamp(70px, 9vw, 104px));
      flex-basis: calc((100% / 6) + clamp(110px, 14vw, 170px));
      grid-template-columns: minmax(0, 1fr) clamp(44px, 5vw, 58px);
    }

    .character-card::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0;
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.42);
      transition: opacity 220ms ease;
    }

    .character-card:focus-visible::after {
      opacity: 1;
    }

    .character-figure {
      display: grid;
      min-width: 0;
      overflow: hidden;
      place-items: end center;
    }

    .character-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      transform: translateY(var(--crop-shift-y)) scale(var(--crop-scale));
      transform-origin: center center;
      user-select: none;
    }

    .character-card.is-active .character-image {
      transform: translateY(var(--crop-shift-y)) scale(var(--crop-scale));
    }

    .character-name {
      display: grid;
      align-items: end;
      justify-items: center;
      min-width: 0;
      align-self: stretch;
      color: rgba(22, 18, 18, 0.92);
      padding-bottom: clamp(16px, 2.8vw, 26px);
      font-size: clamp(17px, 2.4vw, 26px);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.05;
      opacity: 0;
      overflow: hidden;
      text-shadow: none;
      text-orientation: mixed;
      transform: translate(4px, 10px);
      transition: opacity 220ms ease 180ms;
      visibility: hidden;
      writing-mode: vertical-rl;
    }

    .character-card.is-active .character-name {
      opacity: 1;
      visibility: visible;
    }

    .poster-footer {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(12px, 3vw, 44px);
      align-items: end;
    }

    .footer-block {
      display: grid;
      gap: 10px;
      min-width: 0;
      padding-bottom: clamp(28px, 3.8vw, 38px);
    }

    .footer-block.center {
      position: absolute;
      right: 50%;
      bottom: 3px;
      transform: translateX(50%);
      justify-items: center;
      text-align: center;
      gap: 6px;
      padding-bottom: 0;
    }

    .footer-block.center .pixel-bow {
      display: none;
    }

    .footer-block.right {
      justify-items: end;
      text-align: right;
    }

    .pixel-bow {
      width: clamp(52px, 8vw, 86px);
      height: clamp(26px, 4vw, 42px);
      background:
        linear-gradient(90deg, transparent 0 18%, #fff 18% 32%, transparent 32% 42%, #fff 42% 58%, transparent 58% 68%, #fff 68% 82%, transparent 82%),
        linear-gradient(#fff 0 100%);
      clip-path: polygon(0 24%, 32% 24%, 32% 0, 44% 0, 44% 34%, 56% 34%, 56% 0, 68% 0, 68% 24%, 100% 24%, 100% 76%, 68% 76%, 68% 100%, 56% 100%, 56% 66%, 44% 66%, 44% 100%, 32% 100%, 32% 76%, 0 76%);
    }

    .event-title {
      margin: 0;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(30px, 4.4vw, 54px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.9;
      white-space: nowrap;
    }

    .event-date {
      margin: 0;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(30px, 4vw, 50px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.95;
      white-space: nowrap;
    }

    .subtext {
      color: rgba(255, 255, 255, 0.84);
      font-family: "Songti SC", "STSong", serif;
      font-size: clamp(20px, 2.8vw, 34px);
      letter-spacing: 0;
      line-height: 1;
      white-space: nowrap;
    }

    .sweet-sleep {
      color: rgba(255, 255, 255, 0.62);
      font-family: "Songti SC", "STSong", serif;
      font-size: clamp(16px, 2vw, 24px);
      line-height: 1;
    }

    @media (max-width: 760px) {
      :root {
        --poster-width: min(96vw, calc(100svh - 20px), 520px);
      }

      .menu-shell {
        min-height: 100svh;
        padding: 10px;
        place-items: start center;
      }

      .poster {
        aspect-ratio: 1 / 1.3;
      }

      .poster-content {
        grid-template-rows: 42% 34% minmax(0, 1fr);
        gap: 10px;
        padding: 14px;
      }

      .poster-header {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .brand-title {
        font-size: clamp(34px, 11vw, 54px);
      }

      .brand-script {
        margin-left: 54px;
        font-size: clamp(28px, 9vw, 44px);
      }

      .archive {
        margin-left: 116px;
        font-size: clamp(34px, 12vw, 58px);
      }

      .booth {
        justify-items: start;
        text-align: left;
      }

      .booth-number {
        font-size: clamp(30px, 10vw, 48px);
      }

      .market {
        padding: 7px 12px;
        font-size: clamp(20px, 7vw, 30px);
      }

      .character-strip {
        margin-top: 8px;
      }

      .menu-shell[data-active] .character-strip {
        margin-top: 8px;
        margin-bottom: 0;
      }

      .character-card {
        flex: 0 0 calc(100% / 6);
        --crop-scale: 2;
        --crop-shift-y: 13%;
      }

      .character-card.is-active {
        height: calc(100% + clamp(56px, 18vw, 82px));
        flex-basis: calc((100% / 6) + clamp(78px, 24vw, 104px));
        grid-template-columns: minmax(0, 1fr) 34px;
      }

      .character-image {
        transform: translateY(var(--crop-shift-y)) scale(var(--crop-scale));
      }

      .character-card.is-active .character-image {
        align-self: start;
        justify-self: start;
        transform: translateY(var(--crop-shift-y)) scale(var(--crop-scale));
        width: 43%;
        height: 69%;
      }

      .character-name {
        padding-bottom: 14px;
        font-size: clamp(14px, 4.4vw, 18px);
        transform: translate(3px, 14px);
      }

      .poster-footer {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 8px;
      }

      .footer-block {
        gap: 6px;
        padding-bottom: 0;
      }

      .footer-block.center {
        display: none;
      }

      .footer-block.right {
        justify-items: end;
        text-align: right;
      }

      .event-title {
        font-size: clamp(25px, 8vw, 34px);
        white-space: normal;
      }

      .event-date {
        font-size: clamp(25px, 8vw, 34px);
      }

      .subtext {
        font-size: clamp(16px, 4.8vw, 20px);
      }
    }

    @media (max-width: 380px) {
      .character-card {
        --crop-scale: 2.04;
        --crop-shift-y: 14%;
      }
    }

    @media (min-width: 421px) and (max-width: 760px) {
      .character-card {
        --crop-scale: 1.92;
        --crop-shift-y: 12%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="menu-shell" id="menuShell">
    <section class="poster" aria-label="午觉糖水铺菜单主视觉">
      <div class="poster-content">
        <header class="poster-header">
          <div class="brand">
            <h1 class="brand-title">午觉糖水铺</h1>
            <span class="brand-script">kiraikei</span>
            <span class="archive">Archive</span>
          </div>
          <div class="booth">
            <div class="booth-number"><small>摊位号:</small> 1.11H·B20</div>
            <div class="market"><span class="heart">❤</span><span>梦幻集市</span><span class="heart">❤</span></div>
          </div>
        </header>

        <div class="character-strip" aria-label="角色列表">
          <button class="character-card" type="button" data-character="kazusa" aria-label="展开杏山和纱">
            <span class="character-figure">
              <img class="character-image" src="assets/kazusa.jpg" alt="杏山和纱" draggable="false">
            </span>
            <span class="character-name">杏山和纱</span>
          </button>

          <button class="character-card" type="button" data-character="reisa" aria-label="展开宇泽玲纱">
            <span class="character-figure">
              <img class="character-image" src="assets/reisa.jpg" alt="宇泽玲纱" draggable="false">
            </span>
            <span class="character-name">宇泽玲纱</span>
          </button>

          <button class="character-card" type="button" data-character="alice" aria-label="展开天童爱丽丝">
            <span class="character-figure">
              <img class="character-image" src="assets/alice.jpg" alt="天童爱丽丝" draggable="false">
            </span>
            <span class="character-name">天童爱丽丝</span>
          </button>

          <button class="character-card" type="button" data-character="kei" aria-label="展开天童凯伊">
            <span class="character-figure">
              <img class="character-image" src="assets/kei.jpg" alt="天童凯伊" draggable="false">
            </span>
            <span class="character-name">天童凯伊</span>
          </button>

          <button class="character-card" type="button" data-character="hina" aria-label="展开空崎日奈">
            <span class="character-figure">
              <img class="character-image" src="assets/hina.jpg" alt="空崎日奈" draggable="false">
            </span>
            <span class="character-name">空崎日奈</span>
          </button>

          <button class="character-card" type="button" data-character="hoshino" aria-label="展开小鸟游星野">
            <span class="character-figure">
              <img class="character-image" src="assets/hoshino.jpg" alt="小鸟游星野" draggable="false">
            </span>
            <span class="character-name">小鸟游星野</span>
          </button>
        </div>

        <footer class="poster-footer">
          <div class="footer-block">
            <span class="pixel-bow" aria-hidden="true"></span>
            <p class="event-title">Bilibili World 2026</p>
            <span class="subtext">Blue Archive</span>
          </div>

          <div class="footer-block center">
            <span class="pixel-bow" aria-hidden="true"></span>
            <span class="sweet-sleep">午觉糖水铺</span>
          </div>

          <div class="footer-block right">
            <span class="pixel-bow" aria-hidden="true"></span>
            <p class="event-date">7.10-12</p>
            <span class="subtext">Bilibili World 2026</span>
          </div>
        </footer>
      </div>
    </section>
  </main>

  <script>
    const shell = document.getElementById('menuShell');
    const cards = Array.from(document.querySelectorAll('.character-card'));

    function setActive(card) {
      cards.forEach((item) => item.classList.toggle('is-active', item === card));
      if (card) {
        shell.dataset.active = card.dataset.character;
      } else {
        delete shell.dataset.active;
      }
    }

    cards.forEach((card) => {
      card.addEventListener('click', (event) => {
        event.stopPropagation();
        setActive(card.classList.contains('is-active') ? null : card);
      });
    });

    document.addEventListener('click', () => setActive(null));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setActive(null);
    });
  </script>
</body>
</html>
