<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Video</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        body {
            color: #fff;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .stage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        .status {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            text-align: center;
            background: #000;
            transition: opacity 180ms ease;
            pointer-events: none;
        }

        .status.hidden {
            opacity: 0;
        }

        .toolbar {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            display: flex;
            gap: 8px;
            opacity: 0.18;
            transition: opacity 160ms ease;
            z-index: 2;
        }

        .stage:hover .toolbar,
        .toolbar:focus-within {
            opacity: 1;
        }

        button,
        a {
            min-height: 36px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.26);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.58);
            color: #fff;
            font-size: 14px;
            line-height: 34px;
            text-decoration: none;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        button:hover,
        a:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .fallback {
            position: absolute;
            left: 50%;
            bottom: max(18px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: none;
            max-width: calc(100vw - 32px);
            padding: 12px 14px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.72);
            color: rgba(255, 255, 255, 0.88);
            font-size: 14px;
            text-align: center;
            z-index: 3;
        }

        .fallback.visible {
            display: block;
        }

        @media (orientation: portrait) {
            body.landscape-lock {
                width: 100vh;
                height: 100vw;
                overflow: hidden;
            }

            body.landscape-lock .stage {
                top: 0;
                left: 0;
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg) translateY(-100%);
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>
    <main class="stage" id="stage">
        <iframe
            id="player"
            src="https://player.bilibili.com/player.html?bvid=BV1Hb7k6NESM&page=1&autoplay=1&high_quality=1&danmaku=0"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>

        <div class="status" id="status">正在加载视频...</div>

        <nav class="toolbar" aria-label="播放器操作">
            <button type="button" id="fullscreenButton">全屏</button>
            <a href="https://sweet-sleep.cn/ar/" target="_self" rel="noopener">AR</a>
            <a href="https://www.bilibili.com/video/BV1Hb7k6NESM" target="_self" rel="noopener">跳转</a>
        </nav>

        <div class="fallback" id="fallback">
            嵌入播放器加载不顺畅，正在为你打开 B 站页面...
        </div>
    </main>

    <script>
        const bilibiliUrl = 'https://www.bilibili.com/video/BV1Hb7k6NESM';
        const stage = document.getElementById('stage');
        const player = document.getElementById('player');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');
        const fullscreenButton = document.getElementById('fullscreenButton');
        let loaded = false;
        let isLandscapeMode = false;

        player.addEventListener('load', () => {
            loaded = true;
            status.classList.add('hidden');
        });

        player.addEventListener('error', () => {
            redirectToBilibili();
        });

        fullscreenButton.addEventListener('click', async () => {
            if (isLandscapeMode) {
                await exitLandscapeMode();
                return;
            }

            const requestFullscreen =
                stage.requestFullscreen ||
                stage.webkitRequestFullscreen ||
                stage.mozRequestFullScreen ||
                stage.msRequestFullscreen;

            try {
                if (requestFullscreen) {
                    await requestFullscreen.call(stage);
                }
                await lockLandscape();
                isLandscapeMode = true;
                updateFullscreenButton();
            } catch (error) {
                console.warn('Fullscreen request was blocked:', error);
                enableLandscapeFallback();
                isLandscapeMode = true;
                updateFullscreenButton();
            }
        });

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

        async function lockLandscape() {
            const orientation = screen.orientation || screen.msOrientation;

            if (orientation && orientation.lock) {
                try {
                    await orientation.lock('landscape');
                    document.body.classList.remove('landscape-lock');
                    return;
                } catch (error) {
                    console.warn('Orientation lock was blocked:', error);
                }
            }

            enableLandscapeFallback();
        }

        function enableLandscapeFallback() {
            if (window.matchMedia('(orientation: portrait)').matches) {
                document.body.classList.add('landscape-lock');
            }
        }

        async function exitLandscapeMode() {
            const fullscreenElement =
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement;

            if (fullscreenElement) {
                const exitFullscreen =
                    document.exitFullscreen ||
                    document.webkitExitFullscreen ||
                    document.mozCancelFullScreen ||
                    document.msExitFullscreen;

                if (exitFullscreen) {
                    try {
                        await exitFullscreen.call(document);
                    } catch (error) {
                        console.warn('Exit fullscreen was blocked:', error);
                    }
                }
            }

            document.body.classList.remove('landscape-lock');
            if (screen.orientation && screen.orientation.unlock) {
                try {
                    screen.orientation.unlock();
                } catch (error) {
                    console.warn('Orientation unlock was blocked:', error);
                }
            }
            isLandscapeMode = false;
            updateFullscreenButton();
        }

        function handleFullscreenChange() {
            const fullscreenElement =
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement;

            if (!fullscreenElement && isLandscapeMode) {
                document.body.classList.remove('landscape-lock');
                isLandscapeMode = false;
                updateFullscreenButton();
            }
        }

        function updateFullscreenButton() {
            fullscreenButton.textContent = isLandscapeMode ? '竖屏' : '全屏';
            fullscreenButton.setAttribute('aria-label', isLandscapeMode ? '返回竖屏' : '横屏全屏');
        }

        window.setTimeout(() => {
            if (!loaded) {
                redirectToBilibili();
            }
        }, 8000);

        function redirectToBilibili() {
            fallback.classList.add('visible');
            window.setTimeout(() => {
                window.location.href = bilibiliUrl;
            }, 900);
        }
    </script>
</body>
</html>
